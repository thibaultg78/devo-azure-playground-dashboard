name: Generate-CostData

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate cost data
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          SUB_IDF_01: ${{ secrets.SUB_IDF_01 }}
          SUB_LILLE_01: ${{ secrets.SUB_LILLE_01 }}
          SUB_LYON_01: ${{ secrets.SUB_LYON_01 }}
          SUB_MARSEILLE_01: ${{ secrets.SUB_MARSEILLE_01 }}
          SUB_NANTES_01: ${{ secrets.SUB_NANTES_01 }}
          SUB_TEMP_01: ${{ secrets.SUB_TEMP_01 }}
        run: ./Generate-CostData.ps1

      - name: Commit and push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/costs.json
          git diff --staged --quiet || git commit -m "chore: update cost data $(date +'%Y-%m-%d')"
          git push